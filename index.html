<!DOCTYPE html>
<html lang="eng">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayari Math! 1st Grade</title>
    <style>
      :root {
        --primary: #4a90e2;
        --success: #2ecc71;
        --error: #e74c3c;
        --background: #f7f9fc;
        --text: #2c3e50;
      }
      body {
        font-family 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--background);
        color: var(--text);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        max-width: 600px;
        width: 100%;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        position: relative;
      }
      h1 {
        color: var(--primary);
        text-align: center;
        font-size: 2rem;
        margin-bottom: 5px;
      }
      .subtitle {
        text-align: center;
        color: #7f8c8d;
        margin-bottom: 30px;
        font-weight: 500;
      }

      /* Rainbow Cat */
      .cat-container {
        display: flex;
        justify-content: center;
        margin-bottom: 25px;
      }
      .rainbow-cat {
        font-size: 5rem;
        animation: rainbow 3s linear infinite, bounce 2s ease-in-out infinite;
        display: inline-block;
        cursor: pointer;
      }

      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes rainbow {
        0% { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
      }

      /* Sections */
      h2 {
        font-size: 1.2rem;
        color: #34495e;
        border-bottom: 2px solid #edf2f7;
        padding-bottom: 8px;
        margin-top: 30px;
      }
      .question {
        
      }
      .question-text {
        
      }
      .word-problem {
        
      }

      /* Input */
      input[type="number"] {
        
      }
      input[type="number"]:focus {
        
      }

      /* Feedback */
      .question.correct {
        
      }
      .question.incorrect {
        
      }
      .feedback-icon {
        
      }
      .right-side {
        display: flex;
        align-items: center;
      }
      
      /* Footer and Score */
      .footer {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }
      .score-board {
        font-size: 1.3rem;
        font-weight: bold;
        color: var(--primary);
      }
      button {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        transition: transform 0.1s, background-color 0.2s;
      }
      button:hover {
        background-color: #357abd;
      }
      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="cat-container">
        <div class="rainbow-cat" id="cat-mascot" title="Meow! Solve the problems!">🐱</div>
      </div>

      <h1>Mayari's Math Adventure!</h1>
      <div class="subtitle">California Common Core Standards: Grade 1</div>

      <form id="quiz-form">
        <h2>Part 1: Addition &amp; Subtraction Facts</h2>

        <div class="question" data-answer="10">
          <span class="question-text">6 + 4 =</span>
          <div class="right-side">
            <input type="number" required>
            <span class="feedback-icon"></span>
          </div>
        </div>

        <div class="question" data-answer="14">
          <span class="question-text">9 + 5 =</span>
          <div class="right-side">
            <input type="number" required>
            <span class="feedback-icon"></span>
          </div>
        </div>

        <div class="question" data-answer="8">
          <span class="question-text">15 + 7 =</span>
          <div class="right-side">
            <input type="number" required>
            <span class="feedback-icon"></span>
          </div>
        </div>

        <h2>Part 2: Word Problems</h2>

        <h2>Part 3: Finding the Unknown Number</h2>

        <h2>Part 4: Adding Three Numbers</h2>

        <div class="footer">
          <div class="score-board" id="score-display"></div>
          <button type="submit">🚀 Check My Answers!</button>
        </div>
      </form>
      
    </div>

    <script>
      const form          = document.getElementById('quiz-form'),
            questions     = document.querySelectorAll('.question'),
            scoreDisplay  = document.getElementById('score-display'),
            catMascot     = document.getElementById('cat-mascot');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        let correctCount = 0;
        const totalQuestions= questions.length;

        questions.forEach(question => {
          const correctAnswer = parseInt(question.getAttribute('data-answer')),
                input         = question.querySelector('input'),
                userAnswer    = parseInt(input.value),
                icon          = question.querySelector('.feedback-icon');

          if (userAnswer === correctAnswer) {
            correctCount++;
            question.classList.remove('incorrect');
            question.classList.add('correct');
            icon.textContent = '✅';
          } else {
            question.classList.remove('correct');
            question.classList.add('incorrect');
            icon.textContent = '🤔';
          }
        });

        if (correctCount === totalQuestions) {
          scoreDisplay.textContent = `🌟 Perfect Score! ${correctCount}/${totalQuestions} 🌟`;
          scoreDisplay.style.color = '#2ecc71';
          catMascot.textContent = '🦁';
          alert("🎉 Super job! Rainbow Cat is so proud of you!");
        } else {
          scoreDisplay.textContent = `Keep trying! You got ${correctCount}/${totalQuestions} right`;
          scoreDisplay.style.color = '#e67e22';
          catMascot.textContent = '😼';
          alert("✨ Let's do it again and get it ALL right!");
        }
      });

      questions.forEach(q => {
        q.querySelector('input').addEventListener('input', () => {
          catMascot.textContent = '🐱';
        });
      });
    </script>
  </body>
</html>
