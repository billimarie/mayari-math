<!DOCTYPE html>
<html lang="eng">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayari Math! 1st Grade</title>
    <style>
      :root {
        --primary: #4a90e2;
        --success: #2ecc71;
        --error: #e74c3c;
        --background: #f7f9fc;
        --text: #2c3e50;
      }
      body {
        font-family 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--background);
        color: var(--text);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="cat-container">
        <div class="rainbow-cat" id="cat-mascot" title="Meow! Solve the problems!">🐱</div>
      </div>

      <h1>Mayari's Math Adventure!</h1>
      <div class="subtitle">California Common Core Standards: Grade 1</div>

      <form id="quiz-form">
        <h2>Part 1: Addition &amp; Subtraction Facts</h2>

        <div class="question" data-answer="10">
          <span class="question-text">6 + 4 =</span>
          <div class="right-side">
            <input type="number" required>
            <span class="feedback-icon"></span>
          </div>
        </div>

        <div class="question" data-answer="14">
          <span class="question-text">9 + 5 =</span>
          <div class="right-side">
            <input type="number" required>
            <span class="feedback-icon"></span>
          </div>
        </div>

        <div class="question" data-answer="8">
          <span class="question-text">15 + 7 =</span>
          <div class="right-side">
            <input type="number" required>
            <span class="feedback-icon"></span>
          </div>
        </div>

        <h2>Part 2: Word Problems</h2>

        <h2>Part 3: Finding the Unknown Number</h2>

        <h2>Part 4: Adding Three Numbers</h2>

        <div class="footer">
          <div class="score-board" id="score-display"></div>
          <button type="submit">🚀 Check My Answers!</button>
        </div>
      </form>
      
    </div>

    <script>
      const form          = document.getElementById('quiz-form'),
            questions     = document.querySelectorAll('.question'),
            scoreDisplay  = document.getElementById('score-display'),
            catMascot     = document.getElementById('cat-mascot');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        let correctCount = 0;
        const totalQuestions= questions.length;

        questions.forEach(question => {
          const correctAnswer = parseInt(question.getAttribute('data-answer')),
                input         = question.querySelector('input'),
                userAnswer    = parseInt(input.value),
                icon          = question.querySelector('.feedback-icon');

          if (userAnswer === correctAnswer) {
            correctCount++;
            question.classList.remove('incorrect');
            question.classList.add('correct');
            icon.textContent = '✅';
          } else {
            question.classList.remove('correct');
            question.classList.add('incorrect');
            icon.textContent = '🤔';
          }
        });

        if (correctCount === totalQuestions) {
          scoreDisplay.textContent = `🌟 Perfect Score! ${correctCount}/${totalQuestions} 🌟`;
          scoreDisplay.style.color = '#2ecc71';
          catMascot.textContent = '🦁';
          alert("🎉 Super job! Rainbow Cat is so proud of you!");
        } else {
          scoreDisplay.textContent = `Keep trying! You got ${correctCount}/${totalQuestions} right`;
          scoreDisplay.style.color = '#e67e22';
          catMascot.textContent = '😼';
          alert("✨ Let's do it again and get it ALL right!");
        }
      });

      questions.forEach(q => {
        q.querySelector('input').addEventListener('input', () => {
          catMascot.textContent = '🐱';
        });
      });
    </script>
  </body>
</html>
